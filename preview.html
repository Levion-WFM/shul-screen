<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shul Screen — Desktop Preview</title>
<style>
    html, body {
        margin: 0;
        padding: 0;
        background: #000;
        overflow-x: hidden;
    }
    body {
        font-family: system-ui, sans-serif;
    }
    /* Tiny chrome bar so the user knows they're on the preview, not the live screen */
    .preview-bar {
        position: fixed;
        top: 0; left: 0; right: 0;
        height: 28px;
        background: rgba(10, 7, 6, 0.92);
        color: #e9c349;
        font-size: 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 12px;
        z-index: 100;
        border-bottom: 1px solid rgba(233, 195, 73, 0.3);
        backdrop-filter: blur(6px);
    }
    .preview-bar a {
        color: #e9c349;
        text-decoration: none;
        font-weight: 600;
        padding: 4px 10px;
        border: 1px solid rgba(233, 195, 73, 0.4);
        border-radius: 4px;
        transition: background 0.15s;
    }
    .preview-bar a:hover { background: rgba(233, 195, 73, 0.15); }
    .preview-bar .label {
        letter-spacing: 0.1em;
        text-transform: uppercase;
        opacity: 0.85;
    }

    /* Scaled-viewport wrapper.
       The iframe always renders at 1920x1080 (true kiosk dimensions).
       We scale it DOWN with CSS transform so layout positions stay identical. */
    .stage {
        position: relative;
        margin: 28px auto 0;    /* offset for preview bar */
        overflow: hidden;
    }
    .stage-inner {
        width: 1920px;
        height: 1080px;
        transform-origin: top left;
        /* transform: scale(...) set by JS */
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
    }
    iframe {
        width: 1920px;
        height: 1080px;
        border: 0;
        display: block;
        background: #0a0706;
    }
</style>
</head>
<body>
<div class="preview-bar">
    <span class="label">Desktop Preview · 1920×1080 kiosk</span>
    <span>
        <a href="backend.html">← Back to Admin</a>
        <a href="index.html" target="_blank" style="margin-left:8px;">Open Full Screen ↗</a>
    </span>
</div>
<div class="stage">
    <div class="stage-inner">
        <iframe src="index.html" title="Shul Screen Preview"></iframe>
    </div>
</div>
<script>
(function() {
    var stage = document.querySelector('.stage');
    var inner = document.querySelector('.stage-inner');

    function fit() {
        // Use the window's visual width; cap scale at 1 so we never upscale beyond the real screen.
        var vw = document.documentElement.clientWidth;
        var scale = Math.min(vw / 1920, 1);

        inner.style.transform = 'scale(' + scale + ')';

        // The transform shrinks the element visually but its DOM size stays 1920×1080.
        // Give the stage explicit visual dimensions so the page flow reserves the right space
        // and vertical scroll appears only when the scaled height exceeds the viewport.
        stage.style.width = (1920 * scale) + 'px';
        stage.style.height = (1080 * scale) + 'px';
    }

    window.addEventListener('resize', fit);
    window.addEventListener('orientationchange', fit);
    fit();
})();
</script>
</body>
</html>
