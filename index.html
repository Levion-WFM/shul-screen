                    "colors": {

                    },
                    "borderRadius": {
                        "DEFAULT": "2px",
                        "lg": "4px",
                        "xl": "8px",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        // Cormorant Garamond for warmth + character on Latin glyphs;
                        // Frank Ruhl Libre for Hebrew glyphs — it's the canonical shul/sefer

                        "headline": ["Cormorant Garamond", "Frank Ruhl Libre", "Noto Serif", "serif"],

                    }
                }

<style>
        .material-symbols-outlined {
            font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24
        }
        .wood-grain {
            background-color: #1a1510;
            background-image: url(bg-texture.jpg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        .gold-inlay {
            background: linear-gradient(135deg, #8b6b00 0%, #ffe088 45%, #e9c349 55%, #8b6b00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(1px 1px 1px rgba(0,0,0,0.4));
        }
        .gold-border-3d {
            border: 4px solid;
            border-image: linear-gradient(135deg, #c4a129, #ffe088, #8b6b00) 1;
            box-shadow: 0 8px 30px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.12);
        }
        .elevated-3d {
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 15px rgba(0,0,0,0.4), inset 1px 1px 0 rgba(255,255,255,0.05);
        }
        /* Tabular figures on every .font-headline element — zmanim times ("8:00",
           "10:39"), the next-zman countdown, Shabbos times. Without this, proportional
           digits make a "1" narrower than a "0" so the columns micro-shift on each
           refresh. Pro schedule fliers always use tabular nums for the same reason.
           'lnum' (lining figures) keeps the digits at full caps-height so they don't
           sag beneath the label baseline. */
        .font-headline {
            font-feature-settings: "tnum" 1, "lnum" 1;
        }
        /* Small-caps utility for uppercase labels ("KIDDUSH SPONSORED BY", "NEXT",
           info-bar tags). Rendering uppercase text through all-small-caps gives
           it the petite, inscribed-plaque proportions that classic fliers use for
           eyebrow labels — less "billboard", more "engraved brass". */
        .label-smallcaps {
            font-variant-caps: all-small-caps;
            letter-spacing: 0.18em;
        }
        /* Soft warm drop-shadow — the old versions used a hard 2px,2px,0 pixel stamp
           as the first shadow which reads as "aliased computer text" or print-screen
           artifact. Replaced with a layered soft drop; the shadow color is a near-black
           with a subtle brown cast (rgba(30,15,0,…)) instead of pure #000 so it reads
           as "lit ink on warm stone" rather than a graphic-design hard shadow. */
        .text-3d {
            text-shadow:
                0 1px 2px rgba(30, 15, 0, 0.85),
                0 3px 8px rgba(0, 0, 0, 0.5);
        }
        .text-3d-light {
            text-shadow:
                0 1px 1px rgba(30, 15, 0, 0.7),
                0 2px 4px rgba(0, 0, 0, 0.35);
        }
        /* Elegant script for center-column section titles ("Shul", "Community") */
        .font-cursive {
            font-family: 'Great Vibes', cursive;
            letter-spacing: 0.02em;
        }
        .brass-plaque {
            background: linear-gradient(135deg, #a67c00 0%, #bf9b30 40%, #ffcf40 50%, #bf9b30 60%, #a67c00 100%);
            box-shadow:

                inset 1px 1px 1px rgba(255,255,255,0.2),
                inset -1px -1px 1px rgba(0,0,0,0.2);
            border: 2px solid #7a5c00;
        }
        .glow-text-hebrew {
            /* Soft gold halo + warm drop, no more hard-black pixel stamp. */
            text-shadow:
                0 0 12px rgba(233, 195, 73, 0.45),
                0 1px 2px rgba(30, 15, 0, 0.85);
        }
    </style>

<script>
// ========================================
// DATA LAYER
// ========================================
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Parse "7:00" or "7:00 PM" to minutes since midnight
function parseTimeToMin(t) {
    if (!t) return 0;
    t = t.trim();
    var isPM = /pm/i.test(t);
    var isAM = /am/i.test(t);
    var clean = t.replace(/\s*(am|pm)\s*/i, '');
    var parts = clean.split(':');
    var h = parseInt(parts[0], 10) || 0;
    var m = parseInt(parts[1], 10) || 0;
    if (isPM && h < 12) h += 12;
    if (isAM && h === 12) h = 0;
    // If no AM/PM and hour < 12 and likely afternoon (for zmanim context)
    if (!isPM && !isAM && h < 6) h += 12;
    return h * 60 + m;
}
// Minutes to "H:MM" display
function minToTime(mins) {
    var h = Math.floor(mins / 60);
    var m = mins % 60;
    return h + ':' + (m < 10 ? '0' : '') + m;
}
// Subtract N minutes from a time string
function subtractMinutes(timeStr, n) {
    return minToTime(parseTimeToMin(timeStr) - n);
}
// Subtract ~N minutes and round to nearest 5
function subtractAndRound5(timeStr, n) {
    var mins = parseTimeToMin(timeStr) - n;
    mins = Math.round(mins / 5) * 5;
    return minToTime(mins);
}

var lastFetchOk = false;

async function fetchScreenData() {
    try {
        var res = await fetch('/api/get-data');
        if (!res.ok) throw new Error('API error');
        lastFetchOk = true;
        return await res.json();
    } catch (e) {
        lastFetchOk = false;
        try { return JSON.parse(localStorage.getItem('shulScreenData') || 'null'); }
        catch (e2) { return null; }
    }
}

// ========================================
// DYNAMIC DATE
// ========================================
function updateSecularDate() {
    var el = document.getElementById('secularDate');
    if (el) el.textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric', year: 'numeric' });
}
updateSecularDate();
setInterval(updateSecularDate, 60000);

// ========================================
// SIZING RULES
// ========================================
// Consolidated from 3 slots to 2 so each box has more room for longer
// names / longer category labels without clipping. Fonts are slightly
// smaller than the old 2-slot sizes because names can now wrap onto
// multiple lines inside a box — readability wins over single-line.
var commSizes = {
    1: { name: 'text-4xl', label: 'text-base', sub: 'text-base', pad: 'p-5', space: 'space-y-2' },
    2: { name: 'text-2xl', label: 'text-xs',   sub: 'text-xs',   pad: 'p-5', space: 'space-y-1.5' }
};
// Sponsor plaque sizes — tuned for a larger (p-5) brass plaque that can comfortably
// carry 2 entries including a yahrzeit name without text feeling cramped.
var sponsorSizes = {
    1: { name: 'text-3xl', label: 'text-base', gap: 'gap-2', pad: 'p-5' },
    2: { name: 'text-2xl', label: 'text-sm',   gap: 'gap-3', pad: 'p-5' },
    3: { name: 'text-lg',  label: 'text-xs',   gap: 'gap-1', pad: 'p-3' }
};

// ========================================
// RENDER
// ========================================
async function loadScreenData() {
    var data = await fetchScreenData();
    if (!data) return;

    // Remote reload: backend bumps data.reloadNonce to force kiosks to pick up the
    // latest deploy without anyone being on local wifi. First payload seeds the nonce;
    // any later change triggers a hard reload with a cache-busting query param.
    if (typeof data.reloadNonce !== 'undefined' && data.reloadNonce !== null) {
        if (window.__reloadNonce === undefined) {
            window.__reloadNonce = data.reloadNonce;
        } else if (window.__reloadNonce !== data.reloadNonce) {
            location.replace(location.pathname + '?v=' + encodeURIComponent(data.reloadNonce));
            return;
        }
    }

    // ── Zecher Nishmas dedication ──
    // Editable text field on the backend; rendered bottom-right of the kiosk.
    var zecherEl = document.getElementById('zecherNishmas');
    if (zecherEl) zecherEl.textContent = data.zecherNishmas || '';

    // ── Zmanim ──
    if (data.zmanim) {
        var z = data.zmanim;
        var zmMap = {
            'z-candle-lighting': z.candleLighting,
            'z-shacharit': z.shacharit,
            'z-mincha-saturday': z.minchaSaturday,
            'z-havdalah': z.havdalah,
            'z-alot': z.alot,
            'z-sunrise': z.sunrise,
            'z-shema': z.shema,
            'z-sunset': z.sunset,
            'z-parshat': z.parshat
        };
        for (var id in zmMap) {
            var el = document.getElementById(id);
            if (el && zmMap[id]) el.textContent = zmMap[id];
        }
        // Plag HaMincha — show row only when shabbos_zmanim has a value. Same
        // pattern as the optional shkiyah rows below.
        var plagWrap = document.getElementById('z-plag-wrap');
        var plagEl = document.getElementById('z-plag');
        if (plagWrap && plagEl) {
            if (z.plag) {
                plagEl.textContent = z.plag;
                plagWrap.classList.remove('hidden');
            } else {
                plagWrap.classList.add('hidden');
            }
        }
        // Friday Mincha: summer early-shabbos weeks have both A (early) and B (late).
        // When A is present, show "מנחה א / מנחה ב" label and "A / B" value.
        // When A is absent (winter / pre-Chazon-onward), keep the single-value layout.
        var minchaFridayEl = document.getElementById('z-mincha-friday');
        var minchaFridayLabelEl = document.getElementById('z-mincha-friday-label');
        if (minchaFridayEl && z.minchaFriday) {
            if (z.minchaFridayA) {
                minchaFridayEl.textContent = z.minchaFridayA + ' / ' + z.minchaFriday;
                if (minchaFridayLabelEl) minchaFridayLabelEl.textContent = 'מנחה א / מנחה ב';
            } else {
                minchaFridayEl.textContent = z.minchaFriday;
            }
        }
        // Shabbos shiur before mincha (20 min before)
        var shiurMinchaWrap = document.getElementById('z-shiur-mincha-wrap');
        var shiurMinchaEl = document.getElementById('z-shiur-mincha');
        if (shiurMinchaWrap && shiurMinchaEl) {
            if (z.shabbosShiurMincha && z.minchaSaturday) {
                shiurMinchaEl.textContent = subtractMinutes(z.minchaSaturday, 20);
                shiurMinchaWrap.classList.remove('hidden');
            } else {
                shiurMinchaWrap.classList.add('hidden');
            }
        }

        // Shabbos shiur before maariv (~15 min, rounded to nearest 5)
        var shiurMaarivWrap = document.getElementById('z-shiur-maariv-wrap');
        var shiurMaarivEl = document.getElementById('z-shiur-maariv');
        if (shiurMaarivWrap && shiurMaarivEl) {
            if (z.shabbosShiurMaariv && z.havdalah) {
                shiurMaarivEl.textContent = subtractAndRound5(z.havdalah, 15);
                shiurMaarivWrap.classList.remove('hidden');
            } else {
                shiurMaarivWrap.classList.add('hidden');
            }
        }

        // Shiur Chumash — Rav Avraham Meir Weiss, "acher hakidush" (text, not a time).
        // Toggle-gated from backend via z.shabbosShiurChumash so CEO can hide when the
        // maggid shiur isn't meeting (e.g., travelling, yom tov).
        var shiurChumashWrap = document.getElementById('z-shiur-chumash-wrap');
        if (shiurChumashWrap) {
            if (z.shabbosShiurChumash) shiurChumashWrap.classList.remove('hidden');
            else shiurChumashWrap.classList.add('hidden');
        }

        // Pirchei + Avos uBanim — children's learning. Rows always visible; empty time
        // renders as "—" placeholder so the layout shows even before admin fills them in.
        var pircheiWrap = document.getElementById('z-pirchei-wrap');
        var pircheiEl = document.getElementById('z-pirchei');
        if (pircheiWrap && pircheiEl) {
            pircheiEl.textContent = z.pircheiTime || '—';
            pircheiWrap.classList.remove('hidden');
        }
        var avosWrap = document.getElementById('z-avosubanim-wrap');
        var avosEl = document.getElementById('z-avosubanim');
        if (avosWrap && avosEl) {
            avosEl.textContent = z.avosUbanimTime || '—';
            avosWrap.classList.remove('hidden');
        }

        // Shkiyah — sun-set reference times for Friday and Saturday. Data comes
        // from the weekly-schedule API (daily_zmanim.sunset, clocked and clipped
        // of AM/PM). Only un-hide the row when we actually have a value — a
        // missing shkiyah would look like a broken kiosk.
        var shkiaFriWrap = document.getElementById('z-shkia-friday-wrap');
        var shkiaFriEl = document.getElementById('z-shkia-friday');
        if (shkiaFriWrap && shkiaFriEl) {
            if (z.shkiaFriday) {
                shkiaFriEl.textContent = z.shkiaFriday;
                shkiaFriWrap.classList.remove('hidden');
            } else {
                shkiaFriWrap.classList.add('hidden');
            }
        }
        var shkiaSatWrap = document.getElementById('z-shkia-saturday-wrap');
        var shkiaSatEl = document.getElementById('z-shkia-saturday');
        if (shkiaSatWrap && shkiaSatEl) {
            // `z.shkia` is the weekly-schedule API's Saturday shkiyah (aliased
            // as `shkiaShabbos` in backend.html's Copy-as-Text).
            var shkiaSat = z.shkia || z.shkiaSaturday || z.shkiaShabbos;
            if (shkiaSat) {
                shkiaSatEl.textContent = shkiaSat;
                shkiaSatWrap.classList.remove('hidden');
            } else {
                shkiaSatWrap.classList.add('hidden');
            }
        }

        // Hebrew date is now handled by tzeis-based switching below
    }

    // ── Daily Zmanim (from daily_zmanim table) ──
    var dailyContainer = document.getElementById('dailyZmanimSlots');
    // Holiday banner: show HolidayHebrew (+ optional English subtitle) when today has one.
    var holidayBanner = document.getElementById('holidayBanner');
    if (holidayBanner) {
        var holHe = data.dailyZmanim && data.dailyZmanim.holidayHebrew;
        var holEn = data.dailyZmanim && data.dailyZmanim.holidayEnglish;
        if (holHe) {
            document.getElementById('holidayHebrew').textContent = holHe;
            var enEl = document.getElementById('holidayEnglish');
            if (holEn) { enEl.textContent = holEn; enEl.classList.remove('hidden'); }
            else       { enEl.textContent = '';    enEl.classList.add('hidden'); }
            holidayBanner.classList.remove('hidden');
        } else {
            holidayBanner.classList.add('hidden');
        }
    }
    if (dailyContainer && data.dailyZmanim) {
        var dz = data.dailyZmanim;
        var dailyItems = [
            { label: 'עלות השחר', value: dz.alos72 },
            { label: 'טלית ותפילין', value: dz.talis },
            { label: 'הנץ החמה', value: dz.sunrise },
            { label: 'סזק״ש מ״א', value: dz.shemaMa },
            { label: 'סזק״ש גר״א', value: dz.shemaGra },
            { label: 'סוף זמן תפילה', value: dz.shachrisGra },
            { label: 'חצות', value: dz.midday },
            { label: 'מנחה גדולה', value: dz.minchaGedola },
            { label: 'פלג המנחה', value: dz.plag },
            { label: 'שקיעה', value: dz.sunset },
            { label: 'צאת הכוכבים', value: dz.tzes3stars },
            { label: 'ר״ת (72 דק׳)', value: dz.tzes72fix },
        ];
        var dzHtml = '';
        // Populate the countdown source as we iterate (same order, so the grid-flow-col
        // layout still reads chronologically down each column).
        // Layout: justify-between pins the label to the left edge of the grid cell and the
        // time to the right edge, so all times within a column line up vertically.
        window.__zmanimForCountdown = [];
        dailyItems.forEach(function(item) {
            if (!item.value) return;
            dzHtml += '<div class="flex justify-between items-baseline gap-3 px-2 py-0.5 min-w-0">';
            dzHtml += '<span class="text-lg font-bold text-secondary truncate" dir="rtl">' + esc(item.label) + '</span>';
            dzHtml += '<span class="text-primary font-headline font-bold text-2xl text-3d-light tabular-nums shrink-0">' + esc(item.value) + '</span>';
            dzHtml += '</div>';
            window.__zmanimForCountdown.push({ label: item.label, timeStr: item.value, day: 'today' });
        });
        dailyContainer.innerHTML = dzHtml;
    }

    // Tomorrow's zmanim feed the countdown overnight (alos ~5am is "next" at 11pm).
    if (data.dailyZmanimTomorrow) {
        var dzt = data.dailyZmanimTomorrow;
        var tomorrowItems = [
            { label: 'עלות השחר', value: dzt.alos72 },
            { label: 'טלית ותפילין', value: dzt.talis },
            { label: 'הנץ החמה', value: dzt.sunrise },
            { label: 'סזק״ש מ״א', value: dzt.shemaMa },
            { label: 'סזק״ש גר״א', value: dzt.shemaGra },
            { label: 'סוף זמן תפילה', value: dzt.shachrisGra },
            { label: 'חצות', value: dzt.midday },
            { label: 'מנחה גדולה', value: dzt.minchaGedola },
            { label: 'פלג המנחה', value: dzt.plag },
            { label: 'שקיעה', value: dzt.sunset },
            { label: 'צאת הכוכבים', value: dzt.tzes3stars },
            { label: 'ר״ת (72 דק׳)', value: dzt.tzes72fix },
        ];
        window.__zmanimForCountdownTomorrow = [];
        tomorrowItems.forEach(function(item) {
            if (!item.value) return;
            window.__zmanimForCountdownTomorrow.push({ label: item.label, timeStr: item.value, day: 'tomorrow' });
        });
    }

    // ── Weekly Schedule ──
    var schedContainer = document.getElementById('scheduleSlots');
    schedContainer.innerHTML = '';
    if (data.schedule && data.schedule.length) {
        // Scale vertical density by count so tall lists still fit
        var sCount = data.schedule.length;
        var sPy = sCount <= 4 ? 'py-1.5' : (sCount <= 6 ? 'py-1' : 'py-0.5');
        var sTime = sCount <= 4 ? 'text-3xl' : (sCount <= 6 ? 'text-2xl' : 'text-xl');
        var sLabel = sCount <= 6 ? 'text-base' : 'text-sm';
        var schedHtml = '';
        data.schedule.forEach(function(s) {
            schedHtml += '<div class="flex justify-between items-baseline gap-2 px-3 ' + sPy + ' min-w-0">';
            schedHtml += '<span class="' + sLabel + ' font-bold text-secondary truncate" dir="rtl">' + esc(s.label) + '</span>';
            schedHtml += '<span class="text-primary font-headline font-bold ' + sTime + ' text-3d-light shrink-0">' + esc(s.time) + '</span>';
            schedHtml += '</div>';
        });
        schedContainer.innerHTML = schedHtml;
    }

    // ── Shiurim (below schedule, separated by gold line) ──
    var shiurimContainer = document.getElementById('shiurimSlots');
    if (shiurimContainer) {
        shiurimContainer.innerHTML = '';
        if (data.shiurim && data.shiurim.length) {
            var hCount = data.shiurim.length;
            var hPy = hCount <= 4 ? 'py-1' : (hCount <= 6 ? 'py-0.5' : 'py-0');
            var hTime = hCount <= 4 ? 'text-3xl' : (hCount <= 6 ? 'text-2xl' : 'text-xl');
            var hLabel = hCount <= 6 ? 'text-base' : 'text-sm';
            var shHtml = '';
            data.shiurim.forEach(function(s) {
                shHtml += '<div class="flex justify-between items-baseline gap-2 px-3 ' + hPy + ' min-w-0">';
                shHtml += '<span class="' + hLabel + ' font-bold text-secondary truncate" dir="rtl">' + esc(s.label) + '</span>';
                shHtml += '<span class="text-primary font-headline font-bold ' + hTime + ' text-3d-light shrink-0">' + esc(s.time) + '</span>';
                shHtml += '</div>';
            });
            shiurimContainer.innerHTML = shHtml;
        }
    }

    // ── Seder Limud (Kollel Boker / Seder Layla / etc.) ──
    // If admin hasn't saved any yet, render Kollel Boker + Seder Layla with dash
    // placeholders so the layout is visible. As soon as admin adds rows via backend,
    // those replace the placeholders.
    var sederContainer = document.getElementById('sederLimudSlots');
    if (sederContainer) {
        sederContainer.innerHTML = '';
        var sederList = (data.sederLimud && data.sederLimud.length)
            ? data.sederLimud
            : [ { label: 'כולל בוקר', time: '—' }, { label: 'סדר לילה', time: '—' } ];
        var lCount = sederList.length;
        var lPy = lCount <= 4 ? 'py-1' : (lCount <= 6 ? 'py-0.5' : 'py-0');
        var lTime = lCount <= 4 ? 'text-3xl' : (lCount <= 6 ? 'text-2xl' : 'text-xl');
        var lLabel = lCount <= 6 ? 'text-base' : 'text-sm';
        var lHtml = '';
        sederList.forEach(function(s) {
            lHtml += '<div class="flex justify-between items-baseline gap-2 px-3 ' + lPy + ' min-w-0">';
            lHtml += '<span class="' + lLabel + ' font-bold text-secondary truncate" dir="rtl">' + esc(s.label) + '</span>';
            lHtml += '<span class="text-primary font-headline font-bold ' + lTime + ' text-3d-light shrink-0">' + esc(s.time) + '</span>';
            lHtml += '</div>';
        });
        sederContainer.innerHTML = lHtml;
    }

    // ── Sponsors ──
    var sponsorContainer = document.getElementById('sponsorSlots');
    sponsorContainer.innerHTML = '';
    if (data.sponsors && data.sponsors.length) {
        var count = Math.min(data.sponsors.length, 3);
        var sz = sponsorSizes[count];
        sponsorContainer.className = 'flex flex-col w-full relative z-10 ' + sz.gap + ' px-2';
        var plaque = sponsorContainer.parentElement;
        plaque.classList.remove('p-2', 'p-3', 'p-4', 'p-6');
        plaque.classList.add(sz.pad);
        var sHtml = '';
        data.sponsors.forEach(function(s, i) {
            if (i >= 3) return;
            sHtml += '<div class="text-center">';
            sHtml += '<p class="' + sz.label + ' text-on-primary label-smallcaps font-bold opacity-80 break-words leading-snug">' + esc(s.label) + '</p>';
            sHtml += '<h3 class="font-headline ' + sz.name + ' text-on-primary font-bold tracking-[0.05em] break-words leading-snug drop-shadow-sm">' + esc(s.name) + '</h3>';
            sHtml += '</div>';
            if (i < count - 1) sHtml += '<div class="h-px bg-on-primary/20 w-3/4 mx-auto"></div>';
        });
        sponsorContainer.innerHTML = sHtml;
    }

    // ── Fliers (single section, max 2) ──
    // Replaces the old #shulAnnSlots + #commFlierSlots dual-section layout.
    // Single rule: up to 2 fliers in one row. object-contain on each <img>
    // handles orientation automatically — vertical fliers cap on height
    // (centered, narrower than container), horizontal fliers cap on width
    // (filling the row). Two fliers = each gets ~50% width via flex-1.
    //
    // Migration: prior saves wrote data.announcements (max 1) +
    // data.communityFliers (max 3). On load we merge announcements[0] +
    // communityFliers in order and cap at 2, so existing kiosks don't go
    // blank during the transition. New saves write data.fliers directly.
    var fliersSection = document.getElementById('fliersSection');
    var flierSlots = document.getElementById('flierSlots');
    flierSlots.innerHTML = '';

    var fliers = [];
    if (Array.isArray(data.fliers) && data.fliers.length) {
        fliers = data.fliers.slice(0, 2);
    } else {
        // Concatenate announcements + communityFliers in order. Old saves
        // capped announcements at 1 and communityFliers at 3, but very old
        // saves (pre-split) could have up to 3 in announcements, so we don't
        // hard-pick announcements[0] here — same merge rule the admin uses.
        var legacy = [];
        if (Array.isArray(data.announcements)) legacy = legacy.concat(data.announcements);
        if (Array.isArray(data.communityFliers)) legacy = legacy.concat(data.communityFliers);
        fliers = legacy.filter(function(f) {
            return f && (f.imageData || f.title || f.description);
        }).slice(0, 2);
    }

    if (fliers.length === 0) {
        fliersSection.classList.add('hidden');
    } else {
        fliersSection.classList.remove('hidden');
        var fHtml = '';
        fliers.forEach(function(f) {
            // Image source: prefer the Blob URL (CDN-served, browser-cached,
            // egress-cheap) over the embedded base64 data URL. The kiosk
            // continues to handle the legacy data-URL path so older saves
            // keep rendering until the admin re-uploads them through the
            // new flow, but the migration goal is for this branch to be the
            // exception and the imageUrl branch to be the rule.
            var imgSrc = '';
            if (f && typeof f.imageUrl === 'string' && f.imageUrl.indexOf('http') === 0) {
                imgSrc = f.imageUrl;
            } else if (f && typeof f.imageData === 'string' &&
                       f.imageData.length > 10 && f.imageData.startsWith('data:')) {
                imgSrc = f.imageData;
            }
            // Each slot: flex-1 so 2 fliers split 50/50; min-w-0 / min-h-0 lets
            // the image actually shrink to fit (without these the flex child
            // takes its content size and max-h-full has nothing to clamp to).
            fHtml += '<div class="flex-1 min-w-0 min-h-0 flex items-center justify-center overflow-hidden">';
            if (imgSrc) {
                // max-h-full + max-w-full + object-contain together: image
                // fills the larger dimension first while staying inside the
                // box; aspect ratio is preserved; no letterbox bars get baked
                // into the gold border because the border tracks the <img>
                // element's intrinsic content size.
                fHtml += '<img class="max-h-full max-w-full object-contain elevated-3d border-4 border-primary/60 rounded-sm" src="' + esc(imgSrc) + '"/>';
            } else if (f && (f.title || f.description)) {
                // Rare image-less flier — keep a text fallback so saved-but-
                // not-yet-uploaded entries don't render an empty box.
                fHtml += '<div class="text-center w-full px-4 max-w-2xl">';
                if (f.title) fHtml += '<h3 class="font-headline text-4xl font-bold text-primary mb-2 text-3d leading-tight break-words">' + esc(f.title) + '</h3>';
                if (f.description) fHtml += '<p class="text-xl italic text-secondary leading-snug break-words">' + esc(f.description) + '</p>';
                fHtml += '</div>';
            }
            fHtml += '</div>';
        });
        flierSlots.innerHTML = fHtml;
    }

    // ── Text Announcements (max 2, horizontal, each on black bg with own gold rim) ──
    // Capped at 2 (was 3) so each box has room for longer labels and more
    // names without having to truncate. Labels and subtitles now wrap
    // instead of truncating, so multi-word categories like "Mazel Tov
    // Birthdays & Anniversaries" render in full.
    var commContainer = document.getElementById('communitySlots');
    commContainer.innerHTML = '';
    if (data.community && data.community.length) {
        commContainer.classList.remove('hidden');
        var count = Math.min(data.community.length, 2);
        var sz = commSizes[count];
        var cHtml = '';
        data.community.forEach(function(c, i) {
            if (i >= 2) return;
            var lines = (c.names || '').split('\n').filter(function(l){ return l.trim(); });
            var maxNames = count === 2 ? 6 : 8;
            var truncated = lines.length > maxNames;
            if (truncated) lines = lines.slice(0, maxNames);
            cHtml += '<div class="flex-1 min-w-0 bg-black/70 border-4 border-primary/60 rounded-sm elevated-3d ' + sz.pad + ' text-center flex flex-col items-center justify-center ' + sz.space + '">';
            cHtml += '<p class="' + sz.label + ' label-smallcaps font-bold text-primary/80 w-full break-words leading-tight">' + esc(c.label) + '</p>';
            cHtml += '<div class="flex flex-col gap-0.5 w-full">';
            lines.forEach(function(name) {
                cHtml += '<p class="font-headline ' + sz.name + ' italic font-bold text-primary text-3d leading-tight break-words">' + esc(name) + '</p>';
            });
            if (truncated) cHtml += '<p class="font-headline ' + sz.name + ' italic font-bold text-primary/60 leading-tight">&amp; others</p>';
            cHtml += '</div>';
            if (c.sub) cHtml += '<p class="' + sz.sub + ' uppercase tracking-widest font-semibold text-secondary w-full break-words leading-tight">' + esc(c.sub) + '</p>';
            cHtml += '</div>';
        });
        commContainer.innerHTML = cHtml;
    } else {
        commContainer.classList.add('hidden');
    }

    // ── Tzeis-hachochavim day-flip ──
    // The Hebrew day transitions at tzeis (nightfall, 3 stars), NOT at shkiyah/sunset.
    // Gap is ~40-50 min; flipping at shkiyah made the kiosk show tomorrow's Hebrew date and
    // sefirah during that window, which was the reported bug. We now gate on data.tzeisTime
    // (dailyZmanim.tzes_3stars) with a sunsetTime fallback for safety.
    var isAfterTzeis = false;
    var tzeisSrc = data.tzeisTime || data.sunsetTime;
    if (tzeisSrc) {
        var tzeisMin = parseTimeToMin(tzeisSrc);
        var nowLocal = new Date();
        var nowMin = nowLocal.getHours() * 60 + nowLocal.getMinutes();
        isAfterTzeis = nowMin >= tzeisMin;
    }

    // Hebrew date: switch at tzeis
    if (data.hebrewDates) {
        var hebrewToShow = isAfterTzeis
            ? (data.hebrewDates.tomorrow || data.hebrewDates.today)
            : (data.hebrewDates.today || '');
        var hdEl = document.getElementById('hebrewDate');
        if (hdEl && hebrewToShow) hdEl.textContent = hebrewToShow;
    }

    // Sefirah or fallback Hebrew text on bottom left
    var sefirahEl = document.getElementById('infoSefirah');
    if (sefirahEl) {
        var sefirahToShow = null;
        if (data.sefirah) {
            sefirahToShow = isAfterTzeis
                ? (data.sefirah.tomorrow || data.sefirah.today)
                : (data.sefirah.today || null);
        }
        if (sefirahToShow) {
            sefirahEl.textContent = sefirahToShow.hebrew;
        } else if (data.infoBar && data.infoBar.hebrew) {
            // Fallback: show manual Hebrew text when not in sefirah season
            sefirahEl.textContent = data.infoBar.hebrew;
        } else {
            sefirahEl.textContent = '';
        }
    }

    // ── Info Bar ──
    if (data.infoBar) {
        if (data.infoBar.welcome) document.getElementById('infoWelcome').textContent = data.infoBar.welcome;
        if (data.infoBar.reminder) document.getElementById('infoReminder').textContent = data.infoBar.reminder;
    }
}

// Recursive setTimeout prevents stacking on slow networks.
//
// Polling cadence: 5 minutes (was 30s before 2026-04-26).
// Each fetch returns the full screen_data payload, including base64-embedded
// flier images — at ~500KB–1MB per response, 30s polling burned ~40-80GB
// of Neon egress per month per kiosk and tripped Neon's data-transfer quota
// (HTTP 402 "data transfer quota exceeded" on every subsequent query, which
// surfaced to the admin as "failed to save"). 5min cadence cuts egress 10x
// while still being plenty fresh for a wall display whose content changes
// no more often than weekly (zmanim, fliers, sponsors). Time-sensitive UI
// (clocks, countdown, secular date) is driven by local clock ticks, not
// the data poll, so this doesn't slow any visible animation.
async function refreshLoop() {
    await loadScreenData();
    setTimeout(refreshLoop, 5 * 60 * 1000);
}
refreshLoop();

// ── Precision wall clock ──
// Used for time-sensitive religious decisions (sof zman tefillah, candle lighting,
// etc.), so accuracy matters. The Pi stays within a few ms of true time via NTP
// (timesyncd on Pi OS), so system Date is the right source. We render every second
// on the boundary: schedule the next tick for exactly (1000 - Date.now() % 1000) ms
// so "seconds" updates land on the actual second, not drifting between them.
(function startClock() {
    var el = document.getElementById('liveClock');
    if (!el) return;
    function pad2(n) { return n < 10 ? '0' + n : '' + n; }
    function tick() {
        var d = new Date();
        var h = d.getHours();
        var ampm = h >= 12 ? 'PM' : 'AM';
        var h12 = h % 12; if (h12 === 0) h12 = 12;
        el.textContent = pad2(h12) + ':' + pad2(d.getMinutes()) + ':' + pad2(d.getSeconds()) + ' ' + ampm;
        // Fire next tick at the very start of the next second
        setTimeout(tick, 1000 - (Date.now() % 1000) + 2);
    }
    tick();
})();

// ── Secular date in header ──
// The nav secularDate element was previously set by the old data loop; set it once
// per minute from local system time (date only changes at midnight, cheap).
(function startDate() {
    var el = document.getElementById('secularDate');
    if (!el) return;
    function render() {
        var d = new Date();
        el.textContent = d.toLocaleDateString('en-US', {
            weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
        }).toUpperCase();
    }
    render();
    setInterval(render, 60000);
})();

// ── Next-zman countdown (bottom of Daily Zmanim card) ──
// Two sources: __zmanimForCountdown (today) and __zmanimForCountdownTomorrow (for the
// overnight dead zone between tzes-72 ~8:50pm and alos ~5am). We scan today first; if
// every today-zman is past, we roll into tomorrow's list — the seconds-away for those
// are (seconds-till-midnight) + (seconds-from-midnight-to-that-zman).
(function startCountdown() {
    var labelEl = document.getElementById('nextZmanLabel');
    var cdEl = document.getElementById('nextZmanCountdown');
    if (!labelEl || !cdEl) return;
    function fmtRemaining(sec) {
        if (sec <= 0) return 'now';
        if (sec < 60) return 'in ' + sec + 's';
        var totalMin = Math.floor(sec / 60);
        if (totalMin < 60) return 'in ' + totalMin + 'm';
        var h = Math.floor(totalMin / 60);
        var m = totalMin % 60;
        return 'in ' + h + 'h ' + m + 'm';
    }
    function tick() {
        var today = window.__zmanimForCountdown || [];
        var tomorrow = window.__zmanimForCountdownTomorrow || [];
        var now = new Date();
        var nowSecs = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
        var next = null;
        for (var i = 0; i < today.length; i++) {
            var mins = parseTimeToMin(today[i].timeStr);
            if (!mins) continue;
            var zmanSecs = mins * 60;
            if (zmanSecs > nowSecs) { next = { label: today[i].label, remaining: zmanSecs - nowSecs }; break; }
        }
        if (!next) {
            // All of today's zmanim passed. Roll into tomorrow — add seconds-until-midnight.
            var secsTillMidnight = 86400 - nowSecs;
            for (var j = 0; j < tomorrow.length; j++) {
                var tMins = parseTimeToMin(tomorrow[j].timeStr);
                if (!tMins) continue;
                next = { label: tomorrow[j].label + ' (tomorrow)', remaining: secsTillMidnight + tMins * 60 };
                break;
            }
        }
        if (!next) {
            labelEl.textContent = '—';
            cdEl.textContent = '—';
        } else {
            labelEl.textContent = next.label;
            cdEl.textContent = fmtRemaining(next.remaining);
        }
        setTimeout(tick, 1000 - (Date.now() % 1000) + 2);
    }
    tick();
})();
</script>
</body></html>
