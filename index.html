<script>
// ========================================
// DATA LAYER
// ========================================
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Parse "7:00" or "7:00 PM" to minutes since midnight
function parseTimeToMin(t) {
    if (!t) return 0;
    t = t.trim();
    var isPM = /pm/i.test(t);
    var isAM = /am/i.test(t);
    var clean = t.replace(/\s*(am|pm)\s*/i, '');
    var parts = clean.split(':');
    var h = parseInt(parts[0], 10) || 0;
    var m = parseInt(parts[1], 10) || 0;
    if (isPM && h < 12) h += 12;
    if (isAM && h === 12) h = 0;
    // If no AM/PM and hour < 12 and likely afternoon (for zmanim context)
    if (!isPM && !isAM && h < 6) h += 12;
    return h * 60 + m;
}
// Minutes to "H:MM" display
function minToTime(mins) {
    var h = Math.floor(mins / 60);
    var m = mins % 60;
    return h + ':' + (m < 10 ? '0' : '') + m;
}
// Subtract N minutes from a time string
function subtractMinutes(timeStr, n) {
    return minToTime(parseTimeToMin(timeStr) - n);
}
// Subtract ~N minutes and round to nearest 5
function subtractAndRound5(timeStr, n) {
    var mins = parseTimeToMin(timeStr) - n;
    mins = Math.round(mins / 5) * 5;
    return minToTime(mins);
}

var lastFetchOk = false;

async function fetchScreenData() {
    try {
        var res = await fetch('/api/get-data');
        if (!res.ok) throw new Error('API error');
        lastFetchOk = true;
        return await res.json();
    } catch (e) {
        lastFetchOk = false;
        try { return JSON.parse(localStorage.getItem('shulScreenData') || 'null'); }
        catch (e2) { return null; }
    }
}

// ========================================
// DYNAMIC DATE
// ========================================
function updateSecularDate() {
    var el = document.getElementById('secularDate');
    if (el) el.textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric', year: 'numeric' });
}
updateSecularDate();
setInterval(updateSecularDate, 60000);

// ========================================
// SIZING RULES
// ========================================
var annSizes = {
    1: { img: 'w-56', title: 'text-5xl', desc: 'text-2xl', pad: 'p-10 gap-10', maxW: 'max-w-lg', justify: 'justify-center' },
    2: { img: 'w-44', title: 'text-3xl', desc: 'text-lg',  pad: 'p-5 gap-6',   maxW: 'max-w-sm', justify: 'justify-around' },
    3: { img: 'w-32', title: 'text-2xl', desc: 'text-base', pad: 'p-3 gap-4',  maxW: 'max-w-xs', justify: 'justify-around' }
};
var commSizes = {
    1: { name: 'text-4xl', label: 'text-sm',  sub: 'text-sm',  pad: 'p-8', space: 'space-y-3', divH: 'h-24' },
    2: { name: 'text-2xl', label: 'text-xs',  sub: 'text-xs',  pad: 'p-6', space: 'space-y-2', divH: 'h-24' },
    3: { name: 'text-xl',  label: 'text-xs',  sub: 'text-xs',  pad: 'p-4', space: 'space-y-1', divH: 'h-20' }
};
var sponsorSizes = {
    1: { name: 'text-xl',   label: 'text-xs',  gap: 'gap-4', pad: 'p-6' },
    2: { name: 'text-lg',   label: 'text-xs',  gap: 'gap-3', pad: 'p-6' },
    3: { name: 'text-base', label: 'text-xs',  gap: 'gap-2', pad: 'p-4' }
};

// ========================================
// RENDER
// ========================================
async function loadScreenData() {
    var data = await fetchScreenData();

    // Update stale indicator
    var indicator = document.getElementById('lastUpdated');
    if (lastFetchOk) {
        indicator.textContent = 'Updated ' + new Date().toLocaleTimeString();
        indicator.className = 'fixed bottom-1 right-2 text-[10px] text-green-500/60 font-mono z-50';
    } else {
        indicator.textContent = 'Offline — ' + new Date().toLocaleTimeString();
        indicator.className = 'fixed bottom-1 right-2 text-[10px] text-red-400/80 font-mono z-50';
    }

    if (!data) return;

    // ── Zmanim ──
    if (data.zmanim) {
        var z = data.zmanim;
        var zmMap = {
            'z-candle-lighting': z.candleLighting,
            'z-mincha-friday': z.minchaFriday,
            'z-shacharit': z.shacharit,
            'z-mincha-saturday': z.minchaSaturday,
            'z-havdalah': z.havdalah,
            'z-alot': z.alot,
            'z-sunrise': z.sunrise,
            'z-shema': z.shema,
            'z-sunset': z.sunset,
            'z-parshat': z.parshat
        };
        for (var id in zmMap) {
            var el = document.getElementById(id);
            if (el && zmMap[id]) el.textContent = zmMap[id];
        }
        // Shabbos shiur before mincha (20 min before)
        var shiurMinchaWrap = document.getElementById('z-shiur-mincha-wrap');
        var shiurMinchaEl = document.getElementById('z-shiur-mincha');
        if (shiurMinchaWrap && shiurMinchaEl) {
            if (z.shabbosShiurMincha && z.minchaSaturday) {
                shiurMinchaEl.textContent = subtractMinutes(z.minchaSaturday, 20);
                shiurMinchaWrap.classList.remove('hidden');
            } else {
                shiurMinchaWrap.classList.add('hidden');
            }
        }

        // Shabbos shiur before maariv (~15 min, rounded to nearest 5)
        var shiurMaarivWrap = document.getElementById('z-shiur-maariv-wrap');
        var shiurMaarivEl = document.getElementById('z-shiur-maariv');
        if (shiurMaarivWrap && shiurMaarivEl) {
            if (z.shabbosShiurMaariv && z.havdalah) {
                shiurMaarivEl.textContent = subtractAndRound5(z.havdalah, 15);
                shiurMaarivWrap.classList.remove('hidden');
            } else {
                shiurMaarivWrap.classList.add('hidden');
            }
        }

        // Hebrew date
        var hd = document.getElementById('hebrewDate');
        if (hd && z.hebrewDate) hd.textContent = z.hebrewDate;
    }

    // ── Daily Zmanim (from daily_zmanim table) ──
    var dailyContainer = document.getElementById('dailyZmanimSlots');
    if (dailyContainer && data.dailyZmanim) {
        var dz = data.dailyZmanim;
        var dailyItems = [
            { label: 'עלות השחר', value: dz.alos72 },
            { label: 'טלית ותפילין', value: dz.talis },
            { label: 'הנץ החמה', value: dz.sunrise },
            { label: 'סזק״ש מ״א', value: dz.shemaMa },
            { label: 'סזק״ש גר״א', value: dz.shemaGra },
            { label: 'סוף זמן תפילה', value: dz.shachrisGra },
            { label: 'חצות', value: dz.midday },
            { label: 'מנחה גדולה', value: dz.minchaGedola },
            { label: 'פלג המנחה', value: dz.plag },
            { label: 'שקיעה', value: dz.sunset },
            { label: 'צאת הכוכבים', value: dz.tzes3stars },
            { label: 'ר״ת (72 דק׳)', value: dz.tzes72fix },
        ];
        var dzHtml = '';
        dailyItems.forEach(function(item) {
            if (!item.value) return;
            dzHtml += '<div class="flex justify-between items-center px-3 py-1.5">';
            dzHtml += '<span class="text-sm font-bold text-secondary" dir="rtl">' + esc(item.label) + '</span>';
            dzHtml += '<span class="text-primary font-headline font-bold text-xl text-3d-light">' + esc(item.value) + '</span>';
            dzHtml += '</div>';
        });
        dailyContainer.innerHTML = dzHtml;
    }

    // ── Weekly Schedule ──
    var schedContainer = document.getElementById('scheduleSlots');
    schedContainer.innerHTML = '';
    if (data.schedule && data.schedule.length) {
        var schedHtml = '';
        data.schedule.forEach(function(s) {
            schedHtml += '<div class="flex justify-between items-center px-4 py-3">';
            schedHtml += '<span class="text-lg font-bold text-secondary" dir="rtl">' + esc(s.label) + '</span>';
            schedHtml += '<span class="text-primary font-headline font-bold text-3xl text-3d-light">' + esc(s.time) + '</span>';
            schedHtml += '</div>';
        });
        schedContainer.innerHTML = schedHtml;
    }

    // ── Shiurim (below schedule, separated by gold line) ──
    var shiurimContainer = document.getElementById('shiurimSlots');
    if (shiurimContainer) {
        shiurimContainer.innerHTML = '';
        if (data.shiurim && data.shiurim.length) {
            var shHtml = '';
            data.shiurim.forEach(function(s) {
                shHtml += '<div class="flex justify-between items-center px-4 py-2.5">';
                shHtml += '<span class="text-base font-bold text-secondary" dir="rtl">' + esc(s.label) + '</span>';
                shHtml += '<span class="text-primary font-headline font-bold text-2xl text-3d-light">' + esc(s.time) + '</span>';
                shHtml += '</div>';
            });
            shiurimContainer.innerHTML = shHtml;
        }
    }

    // ── Sponsors ──
    var sponsorContainer = document.getElementById('sponsorSlots');
    sponsorContainer.innerHTML = '';
    if (data.sponsors && data.sponsors.length) {
        var count = Math.min(data.sponsors.length, 3);
        var sz = sponsorSizes[count];
        sponsorContainer.className = 'flex flex-col w-full relative z-10 ' + sz.gap + ' px-2';
        var plaque = sponsorContainer.parentElement;
        plaque.classList.remove('p-4', 'p-6');
        plaque.classList.add(sz.pad);
        var sHtml = '';
        data.sponsors.forEach(function(s, i) {
            if (i >= 3) return;
            sHtml += '<div class="text-center">';
            sHtml += '<p class="' + sz.label + ' text-on-primary uppercase tracking-[0.3em] font-bold opacity-80">' + esc(s.label) + '</p>';
            sHtml += '<h3 class="font-headline ' + sz.name + ' text-on-primary font-bold tracking-[0.05em] overflow-hidden text-ellipsis drop-shadow-sm">' + esc(s.name) + '</h3>';
            sHtml += '</div>';
            if (i < count - 1) sHtml += '<div class="h-px bg-on-primary/20 w-3/4 mx-auto"></div>';
        });
        sponsorContainer.innerHTML = sHtml;
    }

    // ── Announcements ──
    var annContainer = document.getElementById('announcementSlots');
    annContainer.innerHTML = '';
    if (data.announcements && data.announcements.length) {
        var count = Math.min(data.announcements.length, 3);
        var sz = annSizes[count];
        annContainer.className = 'flex flex-col flex-1 ' + sz.justify;
        var aHtml = '';
        data.announcements.forEach(function(a, i) {
            if (i >= 3) return;
            var hasImg = a.imageData && a.imageData.length > 10 && a.imageData.startsWith('data:');
            aHtml += '<div class="' + sz.pad + ' flex-1 flex items-center justify-center border-b border-white/5">';
            if (hasImg) {
                aHtml += '<div class="relative ' + sz.img + ' aspect-[4/5] elevated-3d border-4 border-primary/30 rounded-sm overflow-hidden flex-shrink-0">';
                aHtml += '<img class="w-full h-full object-cover" src="' + esc(a.imageData) + '"/>';
                aHtml += '<div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div></div>';
            }
            var hasText = a.title || a.description;
            if (hasText) {
                aHtml += '<div class="' + (hasImg ? 'text-left' : 'text-center') + ' flex-1 ' + sz.maxW + '">';
                if (a.title) aHtml += '<h3 class="font-headline ' + sz.title + ' font-bold text-primary mb-2 text-3d">' + esc(a.title) + '</h3>';
                if (a.description) aHtml += '<p class="' + sz.desc + ' italic text-secondary leading-relaxed">' + esc(a.description) + '</p>';
                aHtml += '</div>';
            }
            aHtml += '</div>';
        });
        annContainer.innerHTML = aHtml;
    }

    // ── Community ──
    var commContainer = document.getElementById('communitySlots');
    commContainer.innerHTML = '';
    if (data.community && data.community.length) {
        var count = Math.min(data.community.length, 3);
        var sz = commSizes[count];
        commContainer.className = sz.pad + ' flex-1 flex justify-around items-center text-center';
        var cHtml = '';
        data.community.forEach(function(c, i) {
            if (i >= 3) return;
            var lines = (c.names || '').split('\n').filter(function(l){ return l.trim(); });
            var maxNames = count === 3 ? 4 : 99;
            var truncated = lines.length > maxNames;
            if (truncated) lines = lines.slice(0, maxNames);
            cHtml += '<div class="flex-1 ' + sz.space + '">';
            cHtml += '<p class="' + sz.label + ' uppercase tracking-[0.4em] font-bold text-primary/80">' + esc(c.label) + '</p>';
            cHtml += '<div class="flex flex-col gap-1">';
            lines.forEach(function(name) {
                cHtml += '<p class="font-headline ' + sz.name + ' italic font-bold text-primary text-3d">' + esc(name) + '</p>';
            });
            if (truncated) cHtml += '<p class="font-headline ' + sz.name + ' italic font-bold text-primary/60">&amp; others</p>';
            cHtml += '</div>';
            if (c.sub) cHtml += '<p class="' + sz.sub + ' uppercase tracking-widest font-semibold text-secondary">' + esc(c.sub) + '</p>';
            cHtml += '</div>';
            if (i < count - 1) cHtml += '<div class="w-px ' + sz.divH + ' bg-white/10 mx-4"></div>';
        });
        commContainer.innerHTML = cHtml;
    }

    // ── Info Bar ──
    if (data.infoBar) {
        if (data.infoBar.hebrew) document.getElementById('infoHebrew').textContent = data.infoBar.hebrew;
        if (data.infoBar.welcome) document.getElementById('infoWelcome').textContent = data.infoBar.welcome;
        if (data.infoBar.reminder) document.getElementById('infoReminder').textContent = data.infoBar.reminder;
    }
}

// Recursive setTimeout prevents stacking on slow networks
async function refreshLoop() {
    await loadScreenData();
    setTimeout(refreshLoop, 30000);
}
refreshLoop();
</script>
