<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BMJ21 Weekly Schedule PDF</title>
<meta name="robots" content="noindex, nofollow"/>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    min-height: 100%;
    background: #0c1326;
    color: #eef2ff;
    font-family: Arial, sans-serif;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 14px;
  }
  .top-bar {
    width: min(100%, 1024px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    color: #cbd5e1;
    font-size: 13px;
  }
  .actions {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  a, button {
    color: #f4d35e;
    background: transparent;
    border: 1px solid rgba(244, 211, 94, 0.5);
    border-radius: 3px;
    padding: 8px 11px;
    text-decoration: none;
    font: 700 12px/1 Arial, sans-serif;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    cursor: pointer;
  }
  a.primary {
    background: #8a6a2a;
    border-color: #8a6a2a;
    color: #fff;
  }
  .pdf-frame {
    width: min(100%, 1024px);
    aspect-ratio: 612 / 810.1982;
    min-height: 70vh;
    border: 0;
    background: #fff;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .embed body, body.embed {
    padding: 0;
    gap: 0;
    background: transparent;
    overflow: hidden;
  }
  body.embed .top-bar { display: none; }
  body.embed .pdf-frame {
    width: 100vw;
    height: 100vh;
    min-height: 0;
    box-shadow: none;
  }
</style>
</head>
<body>
  <div class="top-bar">
    <button type="button" id="back-button">Back</button>
    <div class="actions">
      <button type="button" id="copy-text">Copy as Text</button>
      <a class="primary" id="download-jpg" href="#" onclick="event.preventDefault(); downloadWeeklyScheduleJpg(this);">Download JPG</a>
    </div>
  </div>

  <object
    class="pdf-frame"
    id="pdf-frame"
    type="application/pdf"
    data="/api/weekly-schedule-pdf?inline=1#toolbar=0&navpanes=0&scrollbar=0&view=Fit&zoom=page-fit">
    <a class="primary" href="/api/weekly-schedule-pdf">Open Weekly Schedule PDF</a>
  </object>

<script>
  const isEmbed = (() => {
    try { if (window.self !== window.top) return true; } catch { return true; }
    return new URLSearchParams(location.search).has('embed');
  })();
  if (isEmbed) document.body.classList.add('embed');

  document.getElementById('back-button').addEventListener('click', () => {
    if (history.length > 1) history.back();
    else location.href = '/backend.html';
  });

  let lastZmanim = null;
  let lastParshaName = '';

  function buildScheduleText(z, parsha) {
    if (!z) return '';
    const lines = [];
    lines.push("Beis Medrash D'Jackson 21");
    if (parsha) lines.push(parsha);
    lines.push('');
    if (z.candles) lines.push('(Hadlakas Neiros - ' + z.candles + ')');
    lines.push('');
    if (z.minchaErevShabbosA) lines.push('Mincha 1 - ' + z.minchaErevShabbosA);
    if (z.plag) lines.push('Plag Hamincha - ' + z.plag);
    if (z.minchaErevShabbos) lines.push((z.minchaErevShabbosA ? 'Mincha 2' : 'Mincha') + ' - ' + z.minchaErevShabbos);
    if (z.shkiaFriday) lines.push('Shkiya - ' + z.shkiaFriday);
    lines.push('');
    if (z.shacharis) lines.push('Shachris - ' + z.shacharis);
    if (z.sofZmanKriasShema) {
      lines.push('Sof Z"K Shma - ' + z.sofZmanKriasShema);
    } else if (z.shemaMa || z.shemaGra) {
      lines.push('Sof Z"K Shma - ' + ((z.shemaMa && z.shemaGra) ? (z.shemaMa + '/' + z.shemaGra) : (z.shemaGra || z.shemaMa)));
    }
    const shiurMap = {};
    (Array.isArray(z.shiurim) ? z.shiurim : []).forEach(s => { shiurMap[s.label] = s.time; });
    if (shiurMap['שיעור הלכה']) lines.push('Halacha shiur from the Rav Shlita - ' + shiurMap['שיעור הלכה']);
    if (z.minchaShabbos) lines.push('Mincha - ' + z.minchaShabbos);
    if (z.shkia) lines.push('Shkiya - ' + z.shkia);
    if (shiurMap['פרקי אבות']) lines.push('Pirkei Avos - ' + shiurMap['פרקי אבות']);
    if (z.maariv) lines.push('Mariv - ' + z.maariv);
    return lines.join('\n').replace(/\n{3,}/g, '\n\n').trim();
  }

  async function loadTextData() {
    const res = await fetch('/api/weekly-schedule', { cache: 'no-store' });
    if (!res.ok) return;
    const data = await res.json();
    if (!data.ok) return;
    lastZmanim = data.zmanim;
    lastParshaName = data.zmanim.parashaEnglish || data.zmanim.parashaDb || data.zmanim.parashaHebrew || '';
  }

  document.getElementById('copy-text').addEventListener('click', async () => {
    if (!lastZmanim) await loadTextData();
    const text = buildScheduleText(lastZmanim, lastParshaName);
    const btn = document.getElementById('copy-text');
    try {
      await navigator.clipboard.writeText(text);
      btn.textContent = 'Copied';
    } catch {
      btn.textContent = 'Copy Failed';
    }
    setTimeout(() => { btn.textContent = 'Copy as Text'; }, 1500);
  });

  loadTextData();
</script>
<script src="./download-jpg.js"></script>
</body>
</html>
